<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qFlasher v3.0 - Classic Scroll</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --panel: #111; --accent: #00d4aa; --border: #333; --text: #fff; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ПРИНУДИТЕЛЬНЫЙ СКРОЛЛБАР */
        ::-webkit-scrollbar { width: 14px !important; height: 14px !important; display: block !important; }
        ::-webkit-scrollbar-track { background: #1a1a1a !important; }
        ::-webkit-scrollbar-thumb { background: #444 !important; border: 2px solid #1a1a1a !important; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent) !important; }

        .header { height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; flex-shrink: 0; }
        
        .main { flex: 1; display: grid; grid-template-columns: 300px 1fr 300px; overflow: hidden; }

        /* Панели со скроллом */
        .scroll-area { overflow-y: scroll !important; height: 100%; background: #0d0d0d; }
        
        .sidebar { background: #151515; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .terminal { background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .info { background: #111; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        .file-row { padding: 12px; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .file-row:hover { background: #1a1a1a; color: var(--accent); }
        .file-row.selected { background: #222; border-left: 3px solid var(--accent); }

        #console { flex: 1; padding: 15px; font-family: 'Consolas', monospace; font-size: 12px; color: #0f0; line-height: 1.5; white-space: pre-wrap; }
        
        .controls { padding: 10px; background: #222; display: flex; gap: 5px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; background: var(--accent); color: #000; }
        .btn-s { background: #333; color: #fff; }
        .btn-d { background: #500; color: #fff; }

        .input-bar { padding: 15px; background: #111; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 4px; outline: none; }

        .stat-box { padding: 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; font-size: 12px; }
        .stat-label { color: #888; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 4px; }
        
        .expanded { position: fixed !important; top: 0; left: 0; width: 100% !important; height: 100% !important; z-index: 100; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color:var(--accent)">qFlasher PRO</h2>
        <button id="connBtn" class="btn">CONNECT DEVICE</button>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="controls">
                <button class="btn-s" onclick="app.ls()">🔄 REFRESH</button>
                <button class="btn-s" onclick="app.goUp()">⬆️ UP</button>
                <button class="btn-s" onclick="app.newDir()">📁+ DIR</button>
                <button class="btn-s" onclick="app.newFile()">📄+ FILE</button>
                <button class="btn-s" onclick="document.getElementById('u').click()">⬆️ LOAD</button>
                <button class="btn-d" onclick="app.del()">🗑️ DEL</button>
                <input type="file" id="u" style="display:none">
            </div>
            <div id="curPath" style="padding:10px; font-size:10px; color:var(--accent); background:#000">/ext</div>
            <div id="fileList" class="scroll-area"></div>
        </div>

        <div class="terminal" id="termBox">
            <div class="controls">
                <span>TERMINAL</span>
                <button class="btn-s" onclick="app.send('\x03')">📡 RPC/BREAK</button>
                <button class="btn-s" onclick="app.toggleExp()">🗗 EXPAND</button>
                <button class="btn-s" onclick="app.clear()">📋 CLEAR</button>
            </div>
            <div id="console" class="scroll-area"></div>
            <div class="input-bar">
                <input id="cli" placeholder="Command...">
                <button class="btn" onclick="app.exec()">SEND</button>
            </div>
        </div>

        <div class="info">
            <div class="stat-box"><span class="stat-label">🔋 Battery</span><span id="bat">--%</span></div>
            <div class="stat-box"><span class="stat-label">🆔 Name</span><span id="name">--</span></div>
            <div class="stat-box"><span class="stat-label">🛠️ Version</span><span id="fw">--</span></div>
            <div class="stat-box"><span class="stat-label">📊 Space (/ext)</span><span id="sd">--</span></div>
            <button class="btn-s" onclick="app.info()">🔄 REFRESH INFO</button>
        </div>
    </div>

<script>
class FlipperApp {
    constructor() {
        this.port = null; this.writer = null; this.reader = null;
        this.connected = false; this.path = '/ext'; this.buffer = ''; this.selected = null;
        this.init();
    }

    init() {
        document.getElementById('connBtn').onclick = () => this.connected ? this.stop() : this.start();
        document.getElementById('cli').onkeydown = e => e.key === 'Enter' && this.exec();
        document.getElementById('u').onchange = e => this.upload(e.target.files[0]);
    }

    async start() {
        try {
            this.port = await navigator.serial.requestPort();
            await this.port.open({ baudRate: 115200 });
            this.writer = this.port.writable.getWriter();
            this.connected = true;
            this.read();
            document.getElementById('connBtn').textContent = "DISCONNECT";
            setTimeout(() => { this.info(); this.ls(); }, 500);
        } catch(e) { alert("Error: " + e.message); }
    }

    async stop() {
        this.connected = false;
        location.reload(); 
    }

    async read() {
        this.reader = this.port.readable.getReader();
        const dec = new TextDecoder();
        while(this.connected) {
            try {
                const { value, done } = await this.reader.read();
                if(done) break;
                this.buffer += dec.decode(value);
                let lines = this.buffer.split('\r\n');
                this.buffer = lines.pop();
                for(let l of lines) this.parse(l);
            } catch(e) { break; }
        }
    }

    parse(raw) {
        const line = raw.replace(/\x1B\[[0-9;]*[mK]/g, '').trim();
        if(!line || line.includes('GattChar')) return;
        this.log(line);

        if(line.includes('charge:')) {
            const m = line.match(/charge:\s*(\d+)/);
            if(m) document.getElementById('bat').textContent = m[1] + '%';
        }
        if(line.includes('hardware_name:')) document.getElementById('name').textContent = line.split(':')[1].trim();
        if(line.includes('firmware_version:')) document.getElementById('fw').textContent = line.split(':')[1].trim();
        if(line.includes('Capacity:')) document.getElementById('sd').textContent = line.split(':')[1].trim();

        if(line.startsWith('[D]') || line.startsWith('[F]')) {
            const isD = line.startsWith('[D]');
            const name = line.substring(3).trim().split(' ')[0];
            this.renderRow(name, isD);
        }
    }

    async send(t) {
        if(!this.writer) return;
        await this.writer.write(new TextEncoder().encode(t + '\r\n'));
    }

    exec() {
        const i = document.getElementById('cli');
        this.send(i.value); i.value = '';
    }

    info() {
        this.send('device_info');
        this.send('power info');
        this.send('storage info /ext');
    }

    ls() {
        document.getElementById('fileList').innerHTML = '';
        this.send(`storage list ${this.path}`);
    }

    renderRow(name, isD) {
        const list = document.getElementById('fileList');
        const row = document.createElement('div');
        row.className = 'file-row';
        row.innerHTML = `<span>${isD ? '📁' : '📄'}</span> <span>${name}</span>`;
        row.onclick = () => {
            document.querySelectorAll('.file-row').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            this.selected = { name, isD };
            if(isD) {
                this.path += (this.path.endsWith('/') ? '' : '/') + name;
                document.getElementById('curPath').textContent = this.path;
                this.ls();
            }
        };
        list.appendChild(row);
    }

    goUp() {
        if(this.path === '/ext') return;
        let p = this.path.split('/'); p.pop();
        this.path = p.join('/') || '/ext';
        document.getElementById('curPath').textContent = this.path;
        this.ls();
    }

    newDir() {
        const n = prompt("Folder Name:");
        if(n) { this.send(`storage mkdir ${this.path}/${n}`); setTimeout(()=>this.ls(), 500); }
    }

    newFile() {
        const n = prompt("File Name:");
        if(n) { this.send(`storage write ${this.path}/${n}`); setTimeout(()=>this.ls(), 500); }
    }

    del() {
        if(!this.selected) return;
        if(confirm(`Delete ${this.selected.name}?`)) {
            this.send(`storage remove ${this.path}/${this.selected.name}`);
            setTimeout(()=>this.ls(), 500);
        }
    }

    async upload(f) {
        if(!f) return;
        this.log("!!! Uploading: " + f.name);
        this.send(`storage write ${this.path}/${f.name}`);
        const b = await f.arrayBuffer();
        await this.writer.write(b);
        this.send('\x03');
        setTimeout(()=>this.ls(), 1000);
    }

    log(m) {
        const c = document.getElementById('console');
        c.textContent += "> " + m + "\n";
        c.scrollTop = c.scrollHeight;
    }

    clear() { document.getElementById('console').textContent = ''; }
    toggleExp() { document.getElementById('termBox').classList.toggle('expanded'); }
}
const app = new FlipperApp();
</script>
</body>
</html>
