<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qFlasher PRO | Momentum</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #080808;
            --bg-card: #121212;
            --accent: #00ffcc;
            --accent-dim: rgba(0, 255, 204, 0.1);
            --border: #222;
            --text: #eee;
            --text-dim: #666;
            --error: #ff4444;
        }

        /* ГЛОБАЛЬНЫЙ СКРОЛЛБАР */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { 
            background: #333; 
            border-radius: 4px; 
            border: 2px solid var(--bg-body);
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* TOPBAR */
        header {
            height: 60px;
            padding: 0 20px;
            background: #000;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo { font-weight: 800; font-size: 1.2rem; color: var(--accent); }

        /* GRID LAYOUT */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr 450px;
            flex: 1;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stat-card {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
        }

        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--accent); }

        /* FILE MANAGER */
        .explorer {
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .toolbar {
            padding: 10px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .path-bar {
            padding: 10px 20px;
            font-size: 12px;
            font-family: 'JetBrains Mono';
            background: #0a0a0a;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }

        #file-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .file-item {
            display: grid;
            grid-template-columns: 30px 1fr 100px;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.1s;
            align-items: center;
        }

        .file-item:hover { background: #1a1a1a; }
        .file-item.selected { background: var(--accent-dim); border: 1px solid var(--accent); }

        /* CONSOLE */
        .terminal-container {
            background: #000;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        #console-out {
            flex: 1;
            overflow-y: scroll;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.5;
            color: #00ff66;
            background: #050505;
        }

        .term-input-box {
            padding: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        /* UI ELEMENTS */
        .btn {
            background: #222;
            color: #fff;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn.primary { background: var(--accent); color: #000; border: none; }
        .btn.danger { color: var(--error); border-color: rgba(255,68,68,0.3); }
        .btn.danger:hover { background: var(--error); color: #fff; }

        input {
            background: #111;
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            flex: 1;
            font-family: 'JetBrains Mono';
        }

        /* MODAL */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">qFlasher PRO</div>
    <div id="status" style="font-size: 11px; color: var(--text-dim);">SYSTEM READY</div>
    <button id="connectBtn" class="btn primary">CONNECT DEVICE</button>
</header>

<div class="main-layout">
    <div class="sidebar">
        <div class="stat-card">
            <div class="stat-label">🔋 Battery</div>
            <div id="bat-val" class="stat-value">--%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🆔 Device Name</div>
            <div id="name-val" class="stat-value">---</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🛠️ Firmware</div>
            <div id="fw-val" class="stat-value">---</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">💾 SD Space</div>
            <div id="sd-val" class="stat-value">---</div>
        </div>
        <button class="btn" style="margin-top: 10px;" onclick="app.refreshAll()">🔄 REFRESH INFO</button>
    </div>

    <div class="explorer">
        <div class="toolbar">
            <button class="btn" onclick="app.openModal('folder')">+ FOLDER</button>
            <button class="btn" onclick="app.openModal('file')">+ FILE</button>
            <button class="btn danger" onclick="app.deleteSelected()">DELETE</button>
            <button class="btn" onclick="app.ls()">REFRESH</button>
        </div>
        <div class="path-bar" id="current-path">/ext</div>
        <div id="file-list"></div>
    </div>

    <div class="terminal-container">
        <div id="console-out"></div>
        <div class="term-input-box">
            <input type="text" id="raw-input" placeholder='{"method":"storage_info","params":{"path":"/ext"}}'>
            <button class="btn primary" onclick="app.sendRaw()">EXEC</button>
        </div>
    </div>
</div>

<div id="modal">
    <div style="background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid var(--accent); width: 320px;">
        <h4 id="modal-title" style="margin-bottom: 15px;">New Item</h4>
        <input type="text" id="modal-input" style="width:100%; margin-bottom: 20px;">
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button class="btn" onclick="app.closeModal()">CANCEL</button>
            <button class="btn primary" id="modal-ok">CREATE</button>
        </div>
    </div>
</div>

<script>
class FlipperApp {
    constructor() {
        this.port = null;
        this.reader = null;
        this.writer = null;
        this.currentPath = '/ext';
        this.selectedFile = null;
        this.buffer = '';
        this.setupListeners();
    }

    setupListeners() {
        document.getElementById('connectBtn').onclick = () => this.toggleConnect();
        document.getElementById('raw-input').onkeydown = (e) => e.key === 'Enter' && this.sendRaw();
    }

    async toggleConnect() {
        if (this.port) { location.reload(); return; }
        try {
            this.port = await navigator.serial.requestPort();
            await this.port.open({ baudRate: 115200 });
            this.writer = this.port.writable.getWriter();
            document.getElementById('connectBtn').textContent = 'DISCONNECT';
            document.getElementById('connectBtn').classList.add('danger');
            this.readLoop();
            setTimeout(() => { this.refreshAll(); this.ls(); }, 500);
        } catch (e) { this.log("Error: " + e.message); }
    }

    async readLoop() {
        this.reader = this.port.readable.getReader();
        const decoder = new TextDecoder();
        try {
            while (true) {
                const { value, done } = await this.reader.read();
                if (done) break;
                this.buffer += decoder.decode(value, { stream: true });
                let lines = this.buffer.split('\n');
                this.buffer = lines.pop();
                for (let line of lines) this.handleData(line.trim());
            }
        } catch (e) { this.log("Read error: " + e.message); }
    }

    handleData(line) {
        if (!line) return;
        this.log(line);
        try {
            const data = JSON.parse(line);
            
            // Обработка списка файлов
            if (data.result?.files) {
                this.renderFiles(data.result.files);
            }

            // Обработка информации (Momentum format)
            if (data.result?.charge !== undefined) document.getElementById('bat-val').textContent = data.result.charge + '%';
            if (data.result?.hardware_name) document.getElementById('name-val').textContent = data.result.hardware_name;
            if (data.result?.version_string) document.getElementById('fw-val').textContent = data.result.version_string;
            if (data.result?.free_space) {
                const mb = (data.result.free_space / (1024 * 1024)).toFixed(1);
                document.getElementById('sd-val').textContent = mb + ' MB FREE';
            }
        } catch (e) {}
    }

    async rpc(obj) {
        if (!this.writer) return;
        const payload = JSON.stringify(obj) + '\n';
        await this.writer.write(new TextEncoder().encode(payload));
    }

    ls(path = this.currentPath) {
        this.currentPath = path;
        document.getElementById('current-path').textContent = path;
        this.rpc({ method: "storage_list", params: { path } });
    }

    renderFiles(files) {
        const container = document.getElementById('file-list');
        container.innerHTML = '';
        files.forEach(f => {
            const name = typeof f === 'string' ? f : f.name;
            const isDir = f.type === 'folder' || name.endsWith('/');
            
            const el = document.createElement('div');
            el.className = 'file-item';
            el.innerHTML = `
                <span>${isDir ? '📁' : '📄'}</span>
                <span>${name}</span>
                <span style="color:#444; font-size:10px; text-align:right">${f.size ? (f.size/1024).toFixed(1)+'KB' : ''}</span>
            `;
            
            el.onclick = () => {
                document.querySelectorAll('.file-item').forEach(i => i.classList.remove('selected'));
                el.classList.add('selected');
                this.selectedFile = { name, isDir };
            };

            el.ondblclick = () => {
                if (isDir) {
                    const nextPath = (this.currentPath + '/' + name).replace(/\/+/g, '/');
                    this.ls(nextPath);
                }
            };
            container.appendChild(el);
        });
    }

    async deleteSelected() {
        if (!this.selectedFile) return;
        if (!confirm(`Удалить ${this.selectedFile.name}?`)) return;
        
        const path = (this.currentPath + '/' + this.selectedFile.name).replace(/\/+/g, '/');
        await this.rpc({ method: "storage_remove", params: { path } });
        this.selectedFile = null;
        setTimeout(() => this.ls(), 400);
    }

    openModal(type) {
        const m = document.getElementById('modal');
        const inp = document.getElementById('modal-input');
        const ok = document.getElementById('modal-ok');
        m.style.display = 'flex';
        document.getElementById('modal-title').textContent = type === 'folder' ? 'НОВАЯ ПАПКА' : 'НОВЫЙ ФАЙЛ';
        
        ok.onclick = async () => {
            if (!inp.value) return;
            const path = (this.currentPath + '/' + inp.value).replace(/\/+/g, '/');
            if (type === 'folder') {
                await this.rpc({ method: "storage_mkdir", params: { path } });
            } else {
                await this.rpc({ method: "storage_write", params: { path, data: "" } });
            }
            this.closeModal();
            setTimeout(() => this.ls(), 500);
        };
    }

    closeModal() { document.getElementById('modal').style.display = 'none'; }

    refreshAll() {
        this.rpc({ method: "power_get_info" });
        this.rpc({ method: "system_info" });
        this.rpc({ method: "storage_info", params: { path: "/ext" } });
    }

    log(msg) {
        const out = document.getElementById('console-out');
        const line = document.createElement('div');
        line.textContent = `> ${msg}`;
        out.appendChild(line);
        out.scrollTop = out.scrollHeight;
    }

    sendRaw() {
        const inp = document.getElementById('raw-input');
        try {
            const json = JSON.parse(inp.value);
            this.rpc(json);
            inp.value = '';
        } catch (e) { alert("Ошибка JSON"); }
    }
}

const app = new FlipperApp();
</script>
</body>
</html>
