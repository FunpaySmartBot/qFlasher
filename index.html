<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qFlasher - Universal Flipper Zero File Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #0a0a0a; --bg-1: #111; --bg-2: #1a1a1a; --bg-3: #222;
            --accent: #00d4aa; --accent-h: #00e6b8; --purple: #7c3aed;
            --text-0: #fff; --text-1: #e0e0e0; --text-2: #b0b0b0;
            --border: #333; --success: #00d4aa; --warn: #ffaa00; --error: #ff4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-0); color: var(--text-0); height: 100vh; overflow: hidden; }
        .app { display: grid; grid-template-columns: 300px 1fr 400px; grid-template-rows: 70px 1fr; height: 100vh; }
        .topbar { grid-column: 1 / -1; background: var(--bg-1); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        .status-group { display: flex; align-items: center; gap: 15px; }
        .status { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: rgba(255,68,68,0.1); border-radius: 20px; font-size: 12px; }
        .status.connected { background: rgba(0,212,170,0.2); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--error); }
        .dot.connected { background: var(--success); }
        .sidebar { background: var(--bg-2); border-right: 1px solid var(--border); padding: 24px; }
        .device-name { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 16px; }
        .device-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-item { background: var(--bg-3); padding: 10px; border-radius: 6px; border: 1px solid var(--border); }
        .stat-label { color: var(--text-2); font-size: 11px; display: block; }
        .stat-value { font-family: monospace; font-size: 13px; font-weight: 600; }
        .main-content { background: var(--bg-0); display: flex; flex-direction: column; }
        .file-toolbar { padding: 16px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; background: var(--bg-1); }
        .btn { padding: 8px 14px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-1); border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; transition: 0.2s; }
        .btn:hover { background: var(--bg-3); border-color: var(--accent); }
        .btn-accent { background: var(--accent); color: #000; border: none; font-weight: 600; }
        .file-list { flex: 1; overflow-y: auto; padding: 16px; }
        .console-area { background: #050505; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        #console { flex: 1; padding: 16px; font-family: 'Courier New', monospace; font-size: 12px; overflow-y: auto; color: #00ff00; line-height: 1.4; }
        .console-input-wrap { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
        #consoleInput { flex: 1; background: transparent; border: none; color: #fff; font-family: monospace; outline: none; }
    </style>
</head>
<body>
    <div class="app" id="appContainer">
        <header class="topbar">
            <div class="logo"><strong>qFlasher</strong> <small style="color: var(--text-2)">v2.2</small></div>
            <div class="status-group">
                <div class="status" id="status">
                    <div class="dot" id="statusDot"></div>
                    <span id="statusText">Disconnected</span>
                </div>
                <button class="btn btn-accent" id="connectBtn">🔌 Connect Device</button>
            </div>
        </header>

        <aside class="sidebar">
            <div class="device-name" id="info-name">Searching...</div>
            <div class="device-stats">
                <div class="stat-item">
                    <span class="stat-label">🔋 Battery</span>
                    <span class="stat-value" id="info-battery">--%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">🛠️ Version</span>
                    <span class="stat-value" id="info-version">n/a</span>
                </div>
            </div>
            <div class="stat-item" style="margin-top: 12px; width: 100%">
                <span class="stat-label">📊 SD Card</span>
                <span class="stat-value" id="info-storage">-- / --</span>
            </div>
        </aside>

        <main class="main-content">
            <div class="file-toolbar">
                <button class="btn" id="newFolder">📁 New Folder</button>
                <button class="btn" id="newFile">📄 New File</button>
                <button class="btn" id="uploadBtn">⬆️ Upload</button>
                <button class="btn" id="deleteBtn">🗑️ Delete</button>
                <button class="btn" id="refreshBtn">🔄 Refresh</button>
            </div>
            <div class="file-list" id="fileList">
                <div style="text-align: center; color: var(--text-2); margin-top: 40px;">Connect Flipper to view files</div>
            </div>
        </main>

        <section class="console-area">
            <div style="padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; display: flex; justify-content: space-between;">
                TERMINAL
                <button class="btn" id="clearConsole" style="padding: 2px 6px; font-size: 10px">Clear</button>
            </div>
            <div id="console"></div>
            <div class="console-input-wrap">
                <span style="color: var(--accent)">></span>
                <input type="text" id="consoleInput" placeholder="Send CLI command...">
            </div>
        </section>
    </div>

    <script>
class UniversalFlipperManager {
    constructor() {
        this.port = null;
        this.connected = false;
        this.currentPath = "/ext";
        this.init();
    }

    log(type, msg) {
        const consoleEl = document.getElementById('console');
        const line = document.createElement('div');
        if(type === 'error') line.style.color = 'var(--error)';
        if(type === 'success') line.style.color = 'var(--accent)';
        line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        consoleEl.appendChild(line);
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async connect() {
        try {
            this.port = await navigator.serial.requestPort();
            await this.port.open({ baudRate: 115200 });
            this.connected = true;
            this.updateUI(true);
            this.log('success', 'Connected to Flipper Zero');
            
            this.readLoop();
            
            // Initialization
            await this.write("\x03"); // Break any current process
            setTimeout(() => this.write("device_info\r\n"), 500);
            setTimeout(() => this.ls(), 1000);
        } catch (e) {
            this.log('error', 'Connection failed: ' + e.message);
        }
    }

    async disconnect() {
        if (this.port) await this.port.close();
        this.connected = false;
        this.updateUI(false);
        this.log('info', 'Disconnected');
    }

    async write(data) {
        if (!this.connected) return;
        const writer = this.port.writable.getWriter();
        const encoder = new TextEncoder();
        // Handle escaped hex like \x03
        if (data === "\x03") {
            await writer.write(new Uint8Array([0x03]));
        } else {
            await writer.write(encoder.encode(data));
        }
        writer.releaseLock();
    }

    async readLoop() {
        while (this.port.readable && this.connected) {
            const reader = this.port.readable.getReader();
            try {
                const decoder = new TextDecoder();
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const text = decoder.decode(value);
                    this.parseResponse(text);
                }
            } catch (e) {
                this.log('error', 'Read error: ' + e.message);
            } finally {
                reader.releaseLock();
            }
        }
    }

    parseResponse(text) {
        // Echo to console
        const consoleEl = document.getElementById('console');
        consoleEl.innerText += text;
        consoleEl.scrollTop = consoleEl.scrollHeight;

        // Extract Info
        if (text.includes("battery_level:")) {
            const val = text.match(/battery_level:\s*(\d+)/);
            if (val) document.getElementById('info-battery').textContent = val[1] + "%";
        }
        if (text.includes("hardware_name:")) {
            const val = text.match(/hardware_name:\s*(\w+)/);
            if (val) document.getElementById('info-name').textContent = val[1];
        }
    }

    async ls() {
        if (!this.connected) return;
        this.log('info', 'Updating file list...');
        document.getElementById('fileList').innerHTML = '';
        await this.write(`storage list ${this.currentPath}\r\n`);
    }

    async upload(files) {
        if (!this.connected) return;
        for (let file of files) {
            this.log('warn', `Uploading ${file.name}...`);
            const buffer = await file.arrayBuffer();
            const data = new Uint8Array(buffer);
            
            await this.write(`storage write ${this.currentPath}/${file.name} ${data.length}\r\n`);
            // We write the raw bytes directly
            const writer = this.port.writable.getWriter();
            await writer.write(data);
            writer.releaseLock();
            
            this.log('success', `File ${file.name} sent!`);
        }
        setTimeout(() => this.ls(), 800);
    }

    updateUI(isConnected) {
        document.getElementById('status').classList.toggle('connected', isConnected);
        document.getElementById('statusDot').classList.toggle('connected', isConnected);
        document.getElementById('statusText').textContent = isConnected ? 'Connected' : 'Disconnected';
        document.getElementById('connectBtn').textContent = isConnected ? '🔌 Disconnect' : '🔌 Connect Device';
    }

    init() {
        document.getElementById('connectBtn').onclick = () => this.connected ? this.disconnect() : this.connect();
        document.getElementById('refreshBtn').onclick = () => this.ls();
        document.getElementById('clearConsole').onclick = () => document.getElementById('console').innerHTML = '';
        document.getElementById('consoleInput').onkeydown = e => {
            if (e.key === 'Enter') {
                this.write(e.target.value + "\r\n");
                e.target.value = '';
            }
        };
        document.getElementById('uploadBtn').onclick = () => {
            const inp = document.createElement('input');
            inp.type = 'file';
            inp.onchange = e => this.upload(e.target.files);
            inp.click();
        };
    }
}

const qflasher = new UniversalFlipperManager();
    </script>
</body>
</html>
