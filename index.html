<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qFlasher - Universal Flipper Zero File Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #0a0a0a; --bg-1: #111; --bg-2: #1a1a1a; --bg-3: #222;
            --accent: #00d4aa; --accent-h: #00e6b8; --purple: #7c3aed;
            --text-0: #fff; --text-1: #e0e0e0; --text-2: #b0b0b0;
            --border: #333; --success: #00d4aa; --warn: #ffaa00; --error: #ff4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', monospace; background: var(--bg-0); color: var(--text-0); height: 100vh; overflow: hidden; }
        .app { display: grid; grid-template-columns: 300px 1fr 500px; grid-template-rows: 70px 1fr; height: 100vh; }
        .topbar { grid-column: 1 / -1; background: var(--bg-1); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 20px; }
        .logo { height: 40px; }
        .status { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,68,68,0.1); border-radius: 20px; font-size: 13px; }
        .status.connected { background: rgba(0,212,170,0.2); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--error); }
        .dot.connected { background: var(--success); }
        .sidebar { background: var(--bg-2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .device-info { padding: 24px; border-bottom: 1px solid var(--border); }
        .device-name { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: var(--accent); }
        .device-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 12px; }
        .stat-item { display: flex; flex-direction: column; gap: 4px; }
        .stat-label { color: var(--text-2); font-size: 11px; }
        .connect-btn { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin: 12px 0; }
        .connect-btn.connected { background: var(--error); }
        .file-toolbar { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 8px 14px; background: transparent; border: 1px solid var(--border); color: var(--text-0); border-radius: 6px; font-size: 12px; cursor: pointer; }
        .btn.primary { background: var(--accent); color: #000; }
        .path { padding: 12px 24px; font-size: 13px; color: var(--accent); border-bottom: 1px solid var(--border); }
        .file-list { flex: 1; overflow-y: auto; }
        .file-row { padding: 10px 24px; display: grid; grid-template-columns: 30px 1fr auto; gap: 10px; cursor: pointer; font-size: 13px; }
        .file-row:hover { background: rgba(255,255,255,0.05); }
        .console-panel { background: var(--bg-2); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        #console { flex: 1; overflow-y: auto; padding: 20px; font-family: 'Consolas', monospace; font-size: 12px; background: #000; color: #0f0; line-height: 1.5; }
        .console-input { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        #consoleInput { flex: 1; padding: 10px; background: var(--bg-3); border: 1px solid var(--border); color: #fff; border-radius: 4px; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; background: var(--accent); color: #000; z-index: 100; transform: translateX(200%); transition: 0.3s; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="logo" style="font-weight: 700; color: var(--accent); font-size: 24px;">qFlasher</div>
            <div class="status" id="status">
                <div class="dot" id="statusDot"></div>
                <span id="statusText">Disconnected</span>
            </div>
        </div>
        <div class="sidebar">
            <div class="device-info">
                <div class="device-name" id="deviceName">Flipper Zero</div>
                <div class="device-stats">
                    <div class="stat-item"><div class="stat-label">Version</div><div id="versionInfo">-</div></div>
                    <div class="stat-item"><div class="stat-label">Region</div><div id="regionInfo">-</div></div>
                </div>
                <button class="connect-btn" id="connectBtn">Connect Device</button>
            </div>
            <div class="file-toolbar">
                <button class="btn primary" id="refreshBtn">Refresh Files</button>
                <button class="btn" id="parentBtn">..</button>
            </div>
            <div class="path" id="pathDisplay">/ext</div>
            <div id="fileList" class="file-list"></div>
        </div>
        <div class="console-panel">
            <div id="console"></div>
            <div class="console-input">
                <input id="consoleInput" placeholder="Send command...">
                <button class="btn primary" id="sendCmd">Send</button>
            </div>
        </div>
    </div>
    <div id="toast" class="toast"></div>

<script>
class FlipperManager {
    constructor() {
        this.port = null; this.reader = null; this.writer = null;
        this.connected = false; this.buffer = '';
        this.path = '/ext'; this.files = [];
        this.init();
    }

    init() {
        document.getElementById('connectBtn').onclick = () => this.connected ? this.disconnect() : this.connect();
        document.getElementById('sendCmd').onclick = () => this.exec();
        document.getElementById('refreshBtn').onclick = () => this.ls();
        document.getElementById('parentBtn').onclick = () => this.goUp();
        document.getElementById('consoleInput').onkeydown = (e) => { if(e.key === 'Enter') this.exec(); };
    }

    async connect() {
        try {
            this.port = await navigator.serial.requestPort();
            await this.port.open({ baudRate: 115200 });
            this.writer = this.port.writable.getWriter();
            this.connected = true;
            this.updateStatus(true);
            this.readLoop();
            setTimeout(() => {
                this.send('device_info');
                this.ls();
            }, 500);
        } catch (e) {
            this.toast(e.message, true);
        }
    }

    async disconnect() {
        this.connected = false;
        if (this.reader) {
            await this.reader.cancel();
            this.reader.releaseLock();
            this.reader = null;
        }
        if (this.writer) {
            this.writer.releaseLock();
            this.writer = null;
        }
        if (this.port) {
            await this.port.close();
            this.port = null;
        }
        this.updateStatus(false);
    }

    async readLoop() {
        const decoder = new TextDecoder();
        this.reader = this.port.readable.getReader();
        try {
            while (this.connected) {
                const { value, done } = await this.reader.read();
                if (done) break;
                this.buffer += decoder.decode(value, { stream: true });
                let lines = this.buffer.split('\r\n');
                this.buffer = lines.pop();
                for (let line of lines) this.handleLine(line);
            }
        } catch (e) { console.error(e); }
    }

    handleLine(line) {
        const cleanLine = line.replace(/\x1B\[[0-9;]*[mK]/g, '').trim();
        if (!cleanLine) return;
        this.log(cleanLine);

        if (cleanLine.includes('firmware_version')) document.getElementById('versionInfo').textContent = cleanLine.split(':')[1];
        if (cleanLine.includes('hardware_name')) document.getElementById('deviceName').textContent = cleanLine.split(':')[1];
        if (cleanLine.includes('hardware_region_provisioned')) document.getElementById('regionInfo').textContent = cleanLine.split(':')[1];

        if (cleanLine.startsWith('[D]') || cleanLine.startsWith('[F]')) {
            const isDir = cleanLine.startsWith('[D]');
            const name = cleanLine.substring(3).trim().split(' ')[0];
            this.files.push({ name, type: isDir ? 'folder' : 'file' });
            this.renderFiles();
        }
    }

    async send(text) {
        if (!this.writer) return;
        await this.writer.write(new TextEncoder().encode(text + '\r\n'));
    }

    exec() {
        const input = document.getElementById('consoleInput');
        this.send(input.value);
        input.value = '';
    }

    ls() {
        this.files = [];
        this.renderFiles();
        this.send(`storage list ${this.path}`);
    }

    goUp() {
        if (this.path === '/ext') return;
        const parts = this.path.split('/');
        parts.pop();
        this.path = parts.join('/') || '/';
        document.getElementById('pathDisplay').textContent = this.path;
        this.ls();
    }

    open(name, type) {
        if (type === 'folder') {
            this.path += (this.path.endsWith('/') ? '' : '/') + name;
            document.getElementById('pathDisplay').textContent = this.path;
            this.ls();
        }
    }

    renderFiles() {
        const list = document.getElementById('fileList');
        list.innerHTML = this.files.map(f => `
            <div class="file-row" onclick="manager.open('${f.name}', '${f.type}')">
                <span>${f.type === 'folder' ? '📁' : '📄'}</span>
                <span>${f.name}</span>
                <span style="color:var(--text-2); font-size:10px;">${f.type}</span>
            </div>
        `).join('');
    }

    log(msg) {
        const el = document.getElementById('console');
        const line = document.createElement('div');
        line.textContent = msg;
        el.appendChild(line);
        el.scrollTop = el.scrollHeight;
        if (el.childNodes.length > 100) el.removeChild(el.firstChild);
    }

    updateStatus(conn) {
        this.connected = conn;
        document.getElementById('status').classList.toggle('connected', conn);
        document.getElementById('statusDot').classList.toggle('connected', conn);
        document.getElementById('statusText').textContent = conn ? 'Connected' : 'Disconnected';
        document.getElementById('connectBtn').textContent = conn ? 'Disconnect' : 'Connect Device';
        document.getElementById('connectBtn').classList.toggle('connected', conn);
    }

    toast(msg, err = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = err ? 'var(--error)' : 'var(--accent)';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }
}
const manager = new FlipperManager();
</script>
</body>
</html>
