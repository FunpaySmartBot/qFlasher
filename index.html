<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qFlasher Pro - CLI Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #0a0a0a; --bg-1: #111; --bg-2: #1a1a1a; --bg-3: #222;
            --accent: #00d4aa; --text-0: #fff; --text-2: #b0b0b0;
            --border: #333; --error: #ff4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-0); color: var(--text-0); height: 100vh; overflow: hidden; }
        .app { display: grid; grid-template-columns: 320px 1fr 450px; grid-template-rows: 70px 1fr; height: 100vh; }
        .topbar { grid-column: 1 / -1; background: var(--bg-1); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
        .status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--error); }
        .dot.connected { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .sidebar { background: var(--bg-2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .device-info { padding: 20px; border-bottom: 1px solid var(--border); }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-card { background: var(--bg-3); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        .stat-label { font-size: 10px; color: var(--text-2); text-transform: uppercase; }
        .stat-val { font-size: 14px; font-weight: 600; margin-top: 4px; }
        .file-manager { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .file-list { flex: 1; overflow-y: auto; padding: 10px; }
        .file-row { padding: 8px 12px; display: grid; grid-template-columns: 24px 1fr; gap: 10px; cursor: pointer; border-radius: 6px; font-size: 13px; align-items: center; }
        .file-row:hover { background: rgba(255,255,255,0.05); }
        .console-panel { background: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        #console { flex: 1; overflow-y: auto; padding: 15px; font-family: 'Consolas', monospace; font-size: 12px; color: #0f0; white-space: pre-wrap; }
        .controls { padding: 15px; background: var(--bg-1); border-top: 1px solid var(--border); display: flex; gap: 8px; }
        input { flex: 1; background: var(--bg-2); border: 1px solid var(--border); color: #fff; padding: 8px 12px; border-radius: 4px; outline: none; }
        button { padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s; }
        .btn-p { background: var(--accent); color: #000; }
        .btn-s { background: var(--bg-3); color: #fff; border: 1px solid var(--border); }
        .path-bar { padding: 10px 20px; background: var(--bg-3); font-size: 12px; color: var(--accent); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <h2 style="color:var(--accent)">qFlasher PRO</h2>
            <div class="status"><div id="dot" class="dot"></div><span id="stText">Disconnected</span></div>
            <button id="connBtn" class="btn-p">Connect Flipper</button>
        </header>

        <aside class="sidebar">
            <div class="device-info">
                <div id="devName" style="font-weight:700; font-size:18px;">Offline</div>
                <div class="stats">
                    <div class="stat-card"><div class="stat-label">Battery</div><div id="batVal" class="stat-val">--%</div></div>
                    <div class="stat-card"><div class="stat-label">Firmware</div><div id="verVal" class="stat-val">n/a</div></div>
                </div>
            </div>
            <div class="file-manager">
                <div class="path-bar"><span id="curPath">/ext</span><span id="upBtn" style="cursor:pointer">⬆️ Back</span></div>
                <div class="controls" style="border-top:none; border-bottom:1px solid var(--border)">
                    <button class="btn-s" onclick="document.getElementById('fileUp').click()">Upload</button>
                    <input type="file" id="fileUp" style="display:none">
                    <button class="btn-s" id="refBtn">Refresh</button>
                </div>
                <div id="fileList" class="file-list"></div>
            </div>
        </aside>

        <main style="display:flex; flex-direction:column">
            <div class="path-bar" style="background:var(--bg-1)">Terminal Output</div>
            <div id="console"></div>
            <div class="controls">
                <input id="cliIn" placeholder="Type help...">
                <button id="sendBtn" class="btn-p">Send</button>
            </div>
        </main>

        <section class="console-panel">
            <div class="path-bar">Editor / File View</div>
            <div id="editor" style="flex:1; padding:20px; color:var(--text-2); font-size:13px;">Select a file to view content (WIP)</div>
        </section>
    </div>

<script>
class FlipperCore {
    constructor() {
        this.port = null; this.writer = null; this.reader = null;
        this.connected = false; this.path = '/ext'; this.buffer = '';
        this.files = []; this.init();
    }

    init() {
        document.getElementById('connBtn').onclick = () => this.connected ? this.stop() : this.start();
        document.getElementById('sendBtn').onclick = () => this.exec();
        document.getElementById('refBtn').onclick = () => this.ls();
        document.getElementById('upBtn').onclick = () => this.goUp();
        document.getElementById('cliIn').onkeydown = e => e.key==='Enter' && this.exec();
        document.getElementById('fileUp').onchange = e => this.upload(e.target.files[0]);
    }

    async start() {
        try {
            this.port = await navigator.serial.requestPort();
            await this.port.open({ baudRate: 115200 });
            this.writer = this.port.writable.getWriter();
            this.connected = true;
            this.updateUI(true);
            this.read();
            setTimeout(() => { this.send('device_info'); this.send('power info'); this.ls(); }, 600);
        } catch (e) { alert(e.message); }
    }

    async stop() {
        this.connected = false;
        if(this.reader) { await this.reader.cancel(); this.reader.releaseLock(); }
        if(this.writer) { this.writer.releaseLock(); }
        await this.port.close();
        this.updateUI(false);
    }

    async read() {
        this.reader = this.port.readable.getReader();
        const dec = new TextDecoder();
        try {
            while(this.connected) {
                const { value, done } = await this.reader.read();
                if(done) break;
                this.buffer += dec.decode(value);
                let lines = this.buffer.split('\r\n');
                this.buffer = lines.pop();
                for(let l of lines) this.parse(l);
            }
        } catch(e) {}
    }

    parse(raw) {
        const line = raw.replace(/\x1B\[[0-9;]*[mK]/g, '').trim();
        if(!line) return;
        this.log(line);

        if(line.includes('hardware_name')) document.getElementById('devName').textContent = line.split(':')[1];
        if(line.includes('firmware_version')) document.getElementById('verVal').textContent = line.split(':')[1];
        if(line.includes('charge')) document.getElementById('batVal').textContent = line.split(':')[1].trim() + '%';

        if(line.startsWith('[D]') || line.startsWith('[F]')) {
            const isD = line.startsWith('[D]');
            const name = line.substring(3).trim().split(' ')[0];
            this.files.push({ name, type: isD ? 'folder' : 'file' });
            this.render();
        }
    }

    async send(txt) {
        if(!this.writer) return;
        await this.writer.write(new TextEncoder().encode(txt + '\r\n'));
    }

    exec() {
        const i = document.getElementById('cliIn');
        this.send(i.value); i.value = '';
    }

    ls() {
        this.files = []; this.render();
        this.send(`storage list ${this.path}`);
    }

    goUp() {
        if(this.path === '/ext') return;
        this.path = this.path.substring(0, this.path.lastIndexOf('/')) || '/';
        document.getElementById('curPath').textContent = this.path;
        this.ls();
    }

    open(n, t) {
        if(t === 'folder') {
            this.path += (this.path === '/' ? '' : '/') + n;
            document.getElementById('curPath').textContent = this.path;
            this.ls();
        } else {
            this.send(`storage read ${this.path}/${n}`);
        }
    }

    async upload(file) {
        if(!file) return;
        this.log(`Uploading ${file.name}...`);
        const reader = new FileReader();
        reader.onload = async (e) => {
            const content = e.target.result;
            this.send(`storage remove ${this.path}/${file.name}`);
            this.send(`storage write ${this.path}/${file.name}`);
            await this.writer.write(content); 
            this.send('\x03'); 
            setTimeout(() => this.ls(), 1000);
        };
        reader.readAsArrayBuffer(file);
    }

    render() {
        const l = document.getElementById('fileList');
        l.innerHTML = this.files.map(f => `
            <div class="file-row" onclick="core.open('${f.name}', '${f.type}')">
                <span>${f.type==='folder'?'📁':'📄'}</span>
                <span>${f.name}</span>
            </div>
        `).join('');
    }

    log(m) {
        const c = document.getElementById('console');
        c.textContent += m + '\n';
        c.scrollTop = c.scrollHeight;
    }

    updateUI(c) {
        this.connected = c;
        document.getElementById('dot').className = 'dot' + (c ? ' connected' : '');
        document.getElementById('stText').textContent = c ? 'Connected' : 'Disconnected';
        document.getElementById('connBtn').textContent = c ? 'Disconnect' : 'Connect Flipper';
    }
}
const core = new FlipperCore();
</script>
</body>
</html>
